[storage_backends.age]
selector_contains = ["AGE"]
required_keys = ["AGE_POSTGRES_HOST", "AGE_POSTGRES_PORT", "AGE_POSTGRES_USER", "AGE_POSTGRES_PASSWORD", "AGE_POSTGRES_DB"]

[storage_backends.tidb]
