# External RAG-Anything capability/config checker.
# This file is intentionally repo-local. It does not register an MCP server,
# Codex plugin, or any other runtime integration.

[paths]
rag_dir = "RAG-Anything"
env_files = [".env", "RAG-Anything/.env"]
report_json = "reports/rag-tool-check.json"

[execution]
python = "python"
include_process_env = true
command_timeout_seconds = 20
network_checks = false
storage_connection_checks = false
smoke_tests = false

[coverage]
# When true, the checker compares this manifest against the current submodule.
# Any parser, processor, optional extra, CLI argument, public API method,
# package export, or env key discovered in RAG-Anything but missing here fails
# the coverage check.
require_full_coverage = true
require_full_env_coverage = true
require_full_cli_coverage = true
require_full_export_coverage = true
require_full_api_coverage = true

[policy]
# strict=true treats warnings as failures. You can also pass --strict.
strict = false

required_parsers = ["mineru"]
optional_parsers = ["docling", "paddleocr"]

required_processors = ["image", "table", "equation"]
optional_processors = ["generic"]

# Optional extras declared by RAG-Anything's pyproject.toml. "all" is a meta
# extra and is covered here even though it is not a separate runtime feature.
required_optional_extras = []
optional_extras = ["image", "text", "office", "paddleocr", "markdown", "all"]

# Format/runtime feature checks mapped from the optional extras.
# Examples to hard-require: ["office", "image", "text", "markdown", "paddleocr_pdf"].
required_format_features = []
optional_format_features = ["office", "image", "text", "markdown", "paddleocr_pdf"]

# If PARSER is set in .env/process env, the selected parser must be installed.
selected_parser_required = true

# These env vars describe a usable full RAG runtime. Remove entries if you only
# want to validate parser-only readiness.
required_env = [
  "LLM_BINDING",
  "LLM_MODEL",
  "LLM_BINDING_HOST",
  "EMBEDDING_BINDING",
  "EMBEDDING_MODEL",
  "EMBEDDING_BINDING_HOST",
]

secret_env = [
  "OPENAI_API_KEY",
  "MINIMAX_API_KEY",
  "LLM_BINDING_API_KEY",
  "EMBEDDING_BINDING_API_KEY",
  "RERANK_BINDING_API_KEY",
  "LIGHTRAG_API_KEY",
  "TOKEN_SECRET",
  "POSTGRES_PASSWORD",
  "NEO4J_PASSWORD",
  "AGE_POSTGRES_PASSWORD",
  "TIDB_PASSWORD",
  "MILVUS_PASSWORD",
  "MILVUS_TOKEN",
  "QDRANT_API_KEY",
]

placeholder_values = [
  "",
  "your_api_key",
  "your-secure-api-key-here",
  "your_password",
  "your_username",
  "your_database",
  "xxxxxxxx",
  "token-abc123",
]

[providers]
allowed_llm_bindings = ["openai", "ollama", "lollms", "azure_openai", "lmstudio", "vllm"]
allowed_embedding_bindings = ["openai", "ollama", "lollms", "azure_openai", "lmstudio", "vllm"]
llm_api_key_required_for = ["openai", "azure_openai"]
embedding_api_key_required_for = ["openai", "azure_openai"]
endpoint_bindings = ["openai", "ollama", "lollms", "azure_openai", "lmstudio", "vllm"]

[commands]
mineru = ["mineru", "--version"]
libreoffice = [
  ["libreoffice", "--version"],
  ["soffice", "--version"],
]
ollama = ["ollama", "list"]
pandoc = ["pandoc", "--version"]
git = ["git", "--version"]

