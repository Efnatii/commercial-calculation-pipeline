required_keys = ["QDRANT_URL"]

[storage_backends.redis]
selector_contains = ["Redis"]
required_keys = ["REDIS_URI"]

[cli.parser]
module = "raganything.parser"
description = "Single-document parser CLI"
arguments = [
  "file_path",
  "--output",
  "--method",
  "--lang",
  "--backend",
  "--device",
  "--source",
  "--no-formula",
  "--no-table",
  "--stats",
  "--check",
  "--parser",
  "--vlm_url",
]
method_choices = ["auto", "txt", "ocr"]
backend_choices = ["pipeline", "hybrid-auto-engine", "hybrid-http-client", "vlm-auto-engine", "vlm-http-client"]
source_choices = ["huggingface", "modelscope", "local"]

[cli.batch_parser]
module = "raganything.batch_parser"
description = "Batch document parser CLI"
arguments = [
  "paths",
  "--output",
  "--parser",
  "--method",
  "--workers",
  "--no-progress",
  "--recursive",
  "--timeout",
  "--dry-run",
]
method_choices = ["auto", "txt", "ocr"]

[cli.enhanced_markdown]
module = "raganything.enhanced_markdown"
description = "Enhanced Markdown-to-PDF CLI"
arguments = [
  "input",
  "--output",
  "--method",
  "--css",
  "--info",
]
method_choices = ["auto", "weasyprint", "pandoc", "pandoc_system"]
optional_tools = ["pandoc"]

[api.raganything]
description = "Main RAGAnything class and mixin methods"
methods = [
  "update_config",
  "finalize_storages",
  "check_parser_installation",
  "verify_parser_installation_once",
  "get_config_info",
  "set_content_source_for_context",
  "update_context_config",
  "get_processor_info",
  "parse_document",
  "get_document_processing_status",
  "process_document_complete",
  "process_document_complete_lightrag_api",
  "insert_content_list",
  "is_document_fully_processed",
  "process_folder_complete",
  "process_documents_batch",
  "process_documents_batch_async",
  "get_supported_file_extensions",
  "process_documents_with_rag_batch",
  "aquery",
  "aquery_with_multimodal",
  "aquery_vlm_enhanced",
  "query",
  "query_with_multimodal",
]

[api.parser]
description = "Parser registry and CLI/library helpers"
methods = [
  "register_parser",
  "unregister_parser",
  "list_parsers",
  "get_supported_parsers",
  "get_parser",
]

[api.parser_classes]
description = "Built-in parser class capabilities"
methods = [
  "check_installation",
  "convert_file_to_pdf",
  "convert_office_to_pdf",
  "convert_text_to_pdf",
  "filter_supported_files",
  "parse_document",
  "parse_html",
  "parse_image",
  "parse_office_doc",
  "parse_pdf",
  "parse_text_file",
  "read_from_block",
  "read_from_block_recursive",
]

[api.batch_parser]
description = "Standalone BatchParser class methods"
methods = [
  "get_supported_extensions",
  "process_single_file",
  "process_batch",
  "process_batch_async",
]

[api.batch_result]
description = "Batch processing result helpers"
methods = ["success_rate", "summary"]

[api.markdown]
description = "Enhanced Markdown converter"
methods = [
  "close",
  "convert_markdown_to_pdf",
  "convert_with_pandoc",
  "convert_with_weasyprint",
  "get_backend_info",
]

[api.prompt_manager]
description = "Prompt language manager"
methods = [
  "register_prompt_language",
  "set_prompt_language",
  "get_prompt_language",
  "reset_prompts",
  "get_available_languages",
]

[exports.core]
required = true
symbols = ["RAGAnything", "RAGAnythingConfig", "Parser"]

[exports.parser_registry]
required = false
symbols = ["register_parser", "unregister_parser", "list_parsers", "get_supported_parsers"]

[exports.resilience]
required = false
symbols = ["retry", "async_retry", "CircuitBreaker"]

[exports.callbacks]
required = false
symbols = ["ProcessingCallback", "MetricsCallback", "CallbackManager", "ProcessingEvent"]

[exports.prompt_manager]
required = false
symbols = ["set_prompt_language", "get_prompt_language", "reset_prompts", "register_prompt_language", "get_available_languages"]

[smoke_tests]
# Smoke tests are covered by config but disabled by default because they can
# invoke heavy models, network endpoints, or filesystem conversions.
parser_install_check = false
batch_dry_run = false
markdown_backend_info = false
import_package_exports = true
provider_endpoint_probe = false
storage_connection_probe = false
sample_ingest = false
