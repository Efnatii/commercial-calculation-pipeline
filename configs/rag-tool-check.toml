# External RAG-Anything tool/config checker.
# This file is intentionally repo-local. It does not register an MCP server,
# Codex plugin, or any other runtime integration.

[paths]
rag_dir = "RAG-Anything"
env_files = [".env", "RAG-Anything/.env"]
report_json = "reports/rag-tool-check.json"

[execution]
python = "python"
include_process_env = true
command_timeout_seconds = 20
network_checks = false

[policy]
# strict=true treats warnings as failures. You can also pass --strict.
strict = false

# The checker discovers every tool RAG-Anything offers, but only items listed
# here are treated as hard requirements.
required_parsers = ["mineru"]
optional_parsers = ["docling", "paddleocr"]

required_processors = ["image", "table", "equation"]
optional_processors = ["generic"]

# Examples: ["office", "image", "text", "markdown", "paddleocr_pdf"]
required_format_features = []
optional_format_features = ["office", "image", "text", "markdown", "paddleocr_pdf"]

# If PARSER is set in .env/process env, the selected parser must be installed.
selected_parser_required = true

# These env vars describe a usable full RAG runtime. Remove entries if you only
# want to validate parser-only readiness.
required_env = [
  "LLM_BINDING",
  "LLM_MODEL",
  "LLM_BINDING_HOST",
  "EMBEDDING_BINDING",
  "EMBEDDING_MODEL",
  "EMBEDDING_BINDING_HOST",
]

secret_env = [
  "OPENAI_API_KEY",
  "LLM_BINDING_API_KEY",
  "EMBEDDING_BINDING_API_KEY",
  "LIGHTRAG_API_KEY",
  "TOKEN_SECRET",
  "POSTGRES_PASSWORD",
  "NEO4J_PASSWORD",
  "MILVUS_TOKEN",
  "QDRANT_API_KEY",
]

placeholder_values = [
  "",
  "your_api_key",
  "your-secure-api-key-here",
  "your_password",
  "your_username",
  "xxxxxxxx",
  "token-abc123",
]

[providers]
allowed_llm_bindings = ["openai", "ollama", "lollms", "azure_openai", "lmstudio", "vllm"]
allowed_embedding_bindings = ["openai", "ollama", "lollms", "azure_openai", "lmstudio", "vllm"]

# Bindings that normally require an API key for a production-ready check.
llm_api_key_required_for = ["openai", "azure_openai"]
embedding_api_key_required_for = ["openai", "azure_openai"]

[commands]
mineru = ["mineru", "--version"]
libreoffice = [
  ["libreoffice", "--version"],
  ["soffice", "--version"],
]
